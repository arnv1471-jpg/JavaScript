// base case

// factorial of a number
const factorial = c => {
    if (c <=1){
        return 1
    }
    else{
        return c * factorial(c - 1)
    }
} 

// fibonacci series
const fibo = d => {
    if(d == 1 || d == 2){
        return 1
    }
    else{
        return sibo(d-2) + fibo(d-1)
    }
}
