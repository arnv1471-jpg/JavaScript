<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btn">SHOW TIME</button>
    <h1 id = "output"></h1>
    input type="text" id = "input">

    <script>
        function showTime(){
            let today = new Date()
            document.getElementById('output').innerHTML = today
        }

        let btn = document.querySelector("#btn")
        // btn.addEventListener("click", showTime)
        // btn.addEventListener("mouseover", showTime)
        // btn.addEventListener("mouseleave", showTime)
        // btn.addEventListener("mouseout", showTime)
        btn.addEventListener("mouseenter", showTime)

        let input = document.querySelector("#input")
        input.addEventListener("focus", showTime)




    </script>
</body>
</html>
