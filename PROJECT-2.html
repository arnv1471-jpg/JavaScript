<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT-2(Roll a dice)</title>
</head>
<body>
<img id ="A" src="">
    <script>
let A = prompt("Enter a numer from 1 to 6")
if(A == 1){
    document.write("<big><br>Your choice is : ", A)
    document.getElementById("A").src = "dice-1.png";
}
else if(A == 2){
    document.write("<big><br>Your choice is : ", A)
    document.getElementById("A").src = "dice-2.png";
}
else if(A == 3){
    document.write("<big><br>Your choice is : ", A)
    document.getElementById("A").src = "dice-3.png";
}
else if(A == 4){
    document.write("<big><br>Your choice is : ", A)
    document.getElementById("A").src = "dice-4.png";
}
else if(A == 5){
    document.write("<big><br>Your choice is : ", A)
    document.getElementById("A").src = "dice-5.png";
}
else if(A == 6){
    document.write("<big><br>Your choice is : ", A)
    document.getElementById("A").src = "dice-6.webp";
}
else{
    document.write("<big>Please enter a number from 1 to 6")
}

    </script>
</body>
</html>
