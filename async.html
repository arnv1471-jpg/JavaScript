<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let fruits = ["apple", "orange"]
        const addFruit = newFruit => {
            fruits.push(newFruit)
        }
const displayFruit = () => {
            document.write("<br>", fruits)
        }
        displayFruit()
        addFruit("mango")
        displayFruit()

        const addFruitAsync = newFruit => {
            setTimeout(() => {
                fruits.push(newFruit)
            }, 2000)
        }
        const displayFruitAsync = () => {
            setTimeout(() => {
                document.write("<br>", fruits)
            }, 3000)
        }
          
        // callback
        const addFruitCallback = (newFruit, callback) => {
            setTimeout(() => {
                fruits.push(newFruit)
            }, 2000)
        }
         displayFruitAsync()
        addFruitCallback("pear", () => addFruitCallback("pear", displayFruitAsync))

        // promise - .then, .catch
        const addFruitPromise = (newFruit) => {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    let error = false
                    if(!error){
                        fruits.push(newFruit)
                        resolve()
                    }
                    else{
                        reject()
                    }
                
                }, 2000)
            }) 
        }
        // async await
    </script>
</body>
</html>
