<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <script>
let PI = Math.PI
let sqrt2 = Math.SQRT2
document.write("<br>Square root of 2 = ", sqrt2)
document.write("<br>", Math.pow(5, 3))

let r = Math.random()
document.write("<br>Random = ", r)

let n = r * 1e3
document.write("<br>Random = ", n)

document.write("<br>Truncate: ", Math.trunc(n))
// round
document.write("<br>Round: ", Math.round(n))
// floor
document.write("<br>Floor: ", Math.floor(n))
// ceil
document.write("<br>Ceil: ", Math.ceil(n))

// toFixed
document.write("<br>Fixed(3): ", n.toFixed(3))

// toPrecision
document.write("<br>Precision(6): ", n.toPrecision(6))

// toExponential
document.write("<br>Exponent(3): ", n.toExponential(2))





    </script>
</body>
</html>
